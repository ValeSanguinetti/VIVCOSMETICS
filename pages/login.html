<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Admin - VIV Cosmetics</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-pink-50 flex items-center justify-center h-screen">
<div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">

<h2 class="text-3xl font-semibold mb-8 text-center">
Panel Admin
</h2>
<input
id="email"
type="email"
placeholder="Email"
class="w-full border rounded-lg p-3 mb-4"
/>

<input
id="password"
type="password"
placeholder="Contraseña"
class="w-full border rounded-lg p-3 mb-4"
/>

<button
onclick="login()"
class="w-full bg-pink-400 text-white py-3 rounded-lg hover:bg-pink-500 transition">
Ingresar

</button>

<p id="error" class="text-red-500 text-sm mt-3"></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/login.js"></script>

</body>
</html>
