<!doctype html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin | VilCosmetics</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body class="bg-gray-50">

<header class="py-12 text-center">

<h1 class="text-5xl font-semibold text-pink-500">
Panel Admin
</h1>

<p class="text-gray-500 mt-2">
Agregar productos
</p>

</header>

<div class="flex justify-center gap-4 mb-10">

<button
onclick="mostrarSeccion('agregar')"
class="bg-pink-400 text-white px-6 py-2 rounded-full hover:bg-pink-500">

Agregar producto

</button>


<button
onclick="mostrarSeccion('lista')"
class="border px-6 py-2 rounded-full hover:bg-gray-100">

Ver productos

</button>
<button
onclick="logout()"
class="bg-gray-300 px-4 py-2 rounded">

Cerrar sesión

</button>
</div>

<div id="seccion-agregar">
<main class="max-w-xl mx-auto px-6">

<div class="bg-white shadow-lg rounded-2xl p-8 space-y-5">

<input
id="name"
placeholder="Nombre del producto"
class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-pink-300"
>

<input
id="price"
placeholder="Precio"
type="number"
class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-pink-300"
>
<input
id="stock"
type="number"
placeholder="Stock"
class="w-full border rounded-lg px-4 py-3"
/>
<select
id="category"
class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-pink-300"
>

<option value="labios">Labios</option>
<option value="ojos">Ojos</option>
<option value="rostro">Rostro</option>
<option value="preparacion_fijacion">Preparación y fijación</option>
<option value="cejas">Cejas</option>

</select>

<input
type="file"
id="image"
class="w-full border rounded-lg px-4 py-3"
>

<img
id="preview"
class="w-full h-48 object-cover rounded-xl hidden mt-2"
/>
<button
onclick="createProduct()"
class="w-full bg-pink-400 hover:bg-pink-500 text-white py-3 rounded-full font-semibold transition">

Guardar producto

</button>

</div>

</main>
</div>
<div id="seccion-lista" class="hidden max-w-5xl mx-auto px-6">

<h2 class="text-2xl font-semibold mb-6 text-center">
Productos
</h2>

<div id="products-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>
<footer class="text-center py-10 mt-16 border-t">

<p class="text-gray-400 text-sm">
VIVCosmetics
</p>

</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/dom.js"></script>
<script src="/js/supabase.js"></script>
<script src="/js/panel.js"></script>
</body>
</html>
